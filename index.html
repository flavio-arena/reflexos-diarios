<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<title>Reflexos Diários · Seu Santuário de Ideias</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Reflexos">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f6f6f4; --bg-2:#ffffff; --bg-3:#eeeee9; --sidebar:#f0efe9;
  --text:#2b2b33; --text-2:#6b6b78; --text-3:#9a9aa8;
  --accent:#7c5cff; --accent-soft:#efeaff; --border:#e2e1da;
  --link:#7c5cff; --tag:#0f9d8c; --tag-soft:#e3f6f3;
  --danger:#e0556b; --shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.05);
  --radius:12px; --mono:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
[data-theme="dark"]{
  --bg:#15151f; --bg-2:#1c1c28; --bg-3:#2a2a3a; --sidebar:#13131c;
  --text:#e6e6ee; --text-2:#a0a0b2; --text-3:#6b6b80;
  --accent:#9d86ff; --accent-soft:#2a2440; --border:#2a2a3a;
  --link:#a896ff; --tag:#3fd9c4; --tag-soft:#16332f;
  --danger:#ff6b82; --shadow:0 1px 3px rgba(0,0,0,.3),0 12px 32px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--sans);background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;overflow:hidden;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:inherit}

#lock{position:fixed;inset:0;z-index:1000;background:var(--bg);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:24px}
#lock.show{display:flex}
#lock .logo{font-size:46px}
#lock h2{font-weight:600}
#lock p{color:var(--text-2);font-size:14px;text-align:center;max-width:320px}
#lock input{background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:12px 16px;font-size:16px;width:280px;text-align:center;outline:none}
#lock input:focus{border-color:var(--accent)}
#lock button#lockBtn{background:var(--accent);color:#fff;padding:11px 22px;border-radius:10px;font-weight:600;width:280px}
#lock .err{color:var(--danger);font-size:13px;min-height:16px;text-align:center;max-width:300px}

#app{display:flex;height:100%}
#sidebar{width:270px;min-width:270px;background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100%;transition:margin-left .25s ease}
.brand{padding:16px 16px 10px;display:flex;align-items:center;gap:10px}
.brand .mark{font-size:22px}
.brand .name{font-weight:700;font-size:15px;letter-spacing:.2px}
.brand .sub{font-size:11px;color:var(--text-3);font-weight:500}
.search-wrap{padding:4px 12px 10px;position:relative}
#search{width:100%;background:var(--bg-2);border:1px solid var(--border);border-radius:10px;padding:9px 12px 9px 32px;font-size:13.5px;outline:none}
#search:focus{border-color:var(--accent)}
.search-wrap svg{position:absolute;left:24px;top:14px;width:15px;height:15px;color:var(--text-3)}
#searchResults{position:absolute;left:12px;right:12px;top:46px;background:var(--bg-2);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);max-height:50vh;overflow:auto;z-index:50;display:none}
#searchResults.show{display:block}
.sr-item{padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;font-size:13px}
.sr-item:last-child{border-bottom:none}
.sr-item:hover{background:var(--accent-soft)}
.sr-item .t{font-weight:600;font-size:13px}
.sr-item .x{color:var(--text-3);font-size:11.5px;margin-top:2px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.sr-item mark{background:var(--accent-soft);color:var(--accent);padding:0 1px;border-radius:3px}

.nav{padding:4px 8px;display:flex;flex-direction:column;gap:1px}
.nav button{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:9px;font-size:13.5px;color:var(--text-2);text-align:left;width:100%;font-weight:500}
.nav button:hover{background:var(--bg-3);color:var(--text)}
.nav button.active{background:var(--accent-soft);color:var(--accent);font-weight:600}
.nav button svg{width:16px;height:16px;flex-shrink:0}

.list-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px 6px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-3);font-weight:700}
.list-head button{font-size:16px;color:var(--text-3);line-height:1;padding:2px 6px;border-radius:6px}
.list-head button:hover{background:var(--bg-3);color:var(--accent)}
#noteList{flex:1;overflow-y:auto;padding:0 8px 12px}
.note-item{padding:8px 12px;border-radius:9px;cursor:pointer;margin-bottom:1px}
.note-item:hover{background:var(--bg-3)}
.note-item.active{background:var(--accent-soft)}
.note-item .ti{font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.note-item.active .ti{color:var(--accent)}
.note-item .me{font-size:11px;color:var(--text-3);margin-top:1px;display:flex;gap:6px;align-items:center}
.folder-row{display:flex;align-items:center;gap:6px;padding:6px 10px;font-size:12px;color:var(--text-2);font-weight:600;cursor:pointer;border-radius:8px}
.folder-row:hover{background:var(--bg-3)}
.folder-row .caret{transition:transform .15s;font-size:10px;color:var(--text-3)}
.folder-row.collapsed .caret{transform:rotate(-90deg)}

.side-foot{border-top:1px solid var(--border);padding:8px;display:flex;gap:4px;flex-wrap:wrap}
.side-foot button{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border-radius:9px;font-size:12px;color:var(--text-2);font-weight:500}
.side-foot button:hover{background:var(--bg-3);color:var(--text)}
.side-foot button svg{width:15px;height:15px}

#main{flex:1;display:flex;flex-direction:column;height:100%;min-width:0;background:var(--bg-2)}
.topbar{height:50px;min-height:50px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 14px}
.topbar .hamb{display:none;font-size:20px;padding:4px 8px;border-radius:8px;color:var(--text-2)}
.topbar .hamb:hover{background:var(--bg-3)}
#crumb{font-size:13px;color:var(--text-2);font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar .tb-btn{padding:7px;border-radius:8px;color:var(--text-2)}
.topbar .tb-btn:hover{background:var(--bg-3);color:var(--text)}
.topbar .tb-btn svg{width:17px;height:17px;display:block}
.topbar .tb-btn.on{color:var(--accent);background:var(--accent-soft)}

#content{flex:1;overflow-y:auto;position:relative}

.editor-page{max-width:760px;margin:0 auto;padding:28px 32px 120px;display:flex;flex-direction:column;min-height:100%}
#titleInput{font-size:30px;font-weight:700;border:none;background:none;outline:none;width:100%;margin-bottom:4px;letter-spacing:-.3px}
#titleInput::placeholder{color:var(--text-3)}
.meta-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-size:12px;color:var(--text-3);margin-bottom:16px}
.meta-bar select{background:var(--bg-3);border:1px solid var(--border);border-radius:7px;padding:3px 8px;font-size:12px;outline:none;color:var(--text-2)}
.split{display:flex;gap:0;flex:1;min-height:300px}
#editor{flex:1;border:none;background:none;outline:none;resize:none;font-size:15.5px;line-height:1.75;font-family:var(--sans);width:100%;min-height:50vh;color:var(--text)}
.split.preview-mode #editor{display:none}
.split.split-mode{gap:24px}
.split.split-mode #editor{border-right:1px solid var(--border);padding-right:24px}
#preview{flex:1;display:none;overflow-wrap:break-word;min-width:0}
.split.preview-mode #preview,.split.split-mode #preview{display:block}

.md h1{font-size:26px;margin:18px 0 8px;font-weight:700}
.md h2{font-size:21px;margin:16px 0 7px;font-weight:700}
.md h3{font-size:17px;margin:14px 0 6px;font-weight:600}
.md p{margin:0 0 12px}
.md ul,.md ol{margin:0 0 12px 22px}
.md li{margin:2px 0}
.md blockquote{border-left:3px solid var(--accent);padding:2px 14px;margin:0 0 12px;color:var(--text-2);background:var(--accent-soft);border-radius:0 8px 8px 0}
.md code{background:var(--bg-3);padding:1.5px 6px;border-radius:5px;font-family:var(--mono);font-size:.88em}
.md pre{background:var(--bg-3);padding:14px 16px;border-radius:10px;overflow-x:auto;margin:0 0 12px}
.md pre code{background:none;padding:0}
.md a{color:var(--link);text-decoration:none;border-bottom:1px solid transparent}
.md a:hover{border-bottom-color:var(--link)}
.md hr{border:none;border-top:1px solid var(--border);margin:18px 0}
.md input[type=checkbox]{margin-right:7px}
.md table{border-collapse:collapse;margin:0 0 12px;font-size:14px}
.md th,.md td{border:1px solid var(--border);padding:6px 11px;text-align:left}
.md th{background:var(--bg-3)}
.wikilink{color:var(--link);cursor:pointer;border-bottom:1px solid var(--link);font-weight:500}
.wikilink.missing{color:var(--text-3);border-bottom-style:dashed;border-bottom-color:var(--text-3)}
.tagchip{background:var(--tag-soft);color:var(--tag);padding:1px 8px;border-radius:20px;font-size:.82em;font-weight:600;cursor:pointer;white-space:nowrap}

.backlinks{margin-top:36px;border-top:1px solid var(--border);padding-top:18px}
.backlinks h4{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-3);margin-bottom:10px}
.bl-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:8px;cursor:pointer}
.bl-card:hover{border-color:var(--accent)}
.bl-card .bt{font-weight:600;font-size:13.5px;color:var(--accent);margin-bottom:3px}
.bl-card .bc{font-size:12.5px;color:var(--text-2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.bl-card mark{background:var(--accent-soft);color:var(--accent);border-radius:3px;padding:0 2px}

.page{max-width:900px;margin:0 auto;padding:28px 32px 80px}
.page h1{font-size:25px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
.page .lead{color:var(--text-2);font-size:13.5px;margin-bottom:22px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px}
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;cursor:pointer;transition:border-color .15s,transform .1s}
.card:hover{border-color:var(--accent);transform:translateY(-1px)}
.card .ct{font-weight:600;font-size:14.5px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .cx{font-size:12.5px;color:var(--text-2);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;min-height:30px}
.card .cm{font-size:11px;color:var(--text-3);margin-top:8px;display:flex;gap:8px;align-items:center}
.tagcloud{display:flex;flex-wrap:wrap;gap:9px}
.tagcloud .tc{background:var(--tag-soft);color:var(--tag);padding:6px 14px;border-radius:20px;font-size:13.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.tagcloud .tc .n{background:var(--bg-2);color:var(--text-2);border-radius:12px;padding:0 7px;font-size:11px;font-weight:700}
.tagcloud .tc:hover{transform:scale(1.04)}
.empty{text-align:center;color:var(--text-3);padding:60px 20px;font-size:14px}
.empty .ico{font-size:40px;margin-bottom:12px;opacity:.5}

.cal{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:16px;max-width:340px;margin-bottom:24px;user-select:none}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-head .m{font-weight:700;font-size:15px;text-transform:capitalize}
.cal-head button{padding:4px 10px;border-radius:8px;color:var(--text-2);font-size:16px}
.cal-head button:hover{background:var(--bg-3)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-grid .dow{text-align:center;font-size:10.5px;color:var(--text-3);font-weight:700;padding:2px 0}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:12.5px;cursor:pointer;position:relative;color:var(--text-2)}
.cal-day:hover{background:var(--bg-3)}
.cal-day.today{font-weight:800;color:var(--accent)}
.cal-day.has::after{content:"";position:absolute;bottom:4px;width:4px;height:4px;border-radius:50%;background:var(--accent)}
.cal-day.empty{cursor:default;opacity:0}
.cal-day.sel{background:var(--accent);color:#fff}

#graphWrap{position:relative;width:100%;height:calc(100vh - 180px);min-height:380px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--bg)}
#graph{display:block;width:100%;height:100%;cursor:grab}
.graph-hint{position:absolute;top:10px;left:12px;font-size:11.5px;color:var(--text-3);pointer-events:none}

#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:24px;font-size:13px;font-weight:500;opacity:0;pointer-events:none;transition:.25s;z-index:300;box-shadow:var(--shadow)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-bg.show{display:flex}
.modal{background:var(--bg-2);border-radius:16px;box-shadow:var(--shadow);width:100%;max-width:420px;padding:22px 24px}
.modal h3{font-size:17px;margin-bottom:6px}
.modal p{font-size:13.5px;color:var(--text-2);margin-bottom:16px}
.modal input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 13px;font-size:14px;outline:none;margin-bottom:14px}
.modal input:focus{border-color:var(--accent)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal-actions button{padding:9px 16px;border-radius:9px;font-size:13.5px;font-weight:600}
.btn-ghost{color:var(--text-2)}.btn-ghost:hover{background:var(--bg-3)}
.btn-primary{background:var(--accent);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.menu{position:fixed;background:var(--bg-2);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);z-index:250;padding:5px;display:none;min-width:170px}
.menu.show{display:block}
.menu button{display:flex;align-items:center;gap:9px;width:100%;text-align:left;padding:8px 11px;border-radius:7px;font-size:13px;color:var(--text)}
.menu button:hover{background:var(--bg-3)}
.menu button.danger{color:var(--danger)}
.menu hr{border:none;border-top:1px solid var(--border);margin:4px 0}

.scrim{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
@media(max-width:760px){
  #sidebar{position:fixed;z-index:100;height:100%;margin-left:-270px;box-shadow:var(--shadow)}
  #sidebar.open{margin-left:0}
  .scrim.show{display:block}
  .topbar .hamb{display:block}
  .editor-page,.page{padding:20px 18px 120px}
  #titleInput{font-size:25px}
  .split.split-mode{flex-direction:column;gap:14px}
  .split.split-mode #editor{border-right:none;padding-right:0;border-bottom:1px solid var(--border);padding-bottom:14px}
}
</style>
</head>
<body>

<div id="lock">
  <div class="logo">🌿</div>
  <h2>Reflexos Diários</h2>
  <p id="lockMsg">Entre para sincronizar suas notas entre todos os aparelhos.</p>
  <input id="authEmail" type="email" placeholder="seu@email.com" autocomplete="email">
  <input id="lockInput" type="password" placeholder="Senha" autocomplete="current-password">
  <div class="err" id="lockErr"></div>
  <button id="lockBtn">Entrar</button>
  <div style="font-size:13px;color:var(--text-2);text-align:center;line-height:2">
    <span id="authToggle" style="color:var(--accent);cursor:pointer;font-weight:600">Criar uma conta</span><br>
    <span id="authOffline" style="cursor:pointer;color:var(--text-3)">ou usar só neste aparelho (sem sincronizar)</span>
  </div>
</div>

<div id="app">
  <div class="scrim" id="scrim"></div>
  <aside id="sidebar">
    <div class="brand">
      <span class="mark">🌿</span>
      <div><div class="name">Reflexos Diários</div><div class="sub">seu santuário de ideias</div></div>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4-4"/></svg>
      <input id="search" placeholder="Buscar em tudo…" autocomplete="off">
      <div id="searchResults"></div>
    </div>
    <nav class="nav">
      <button data-view="daily" class="active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg> Diário</button>
      <button data-view="all"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M8 8h8M8 12h8M8 16h5"/></svg> Todas as notas</button>
      <button data-view="tags"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.6 13.4 12 22l-9-9V3h10z"/><circle cx="7.5" cy="7.5" r="1.5" fill="currentColor"/></svg> Tags</button>
      <button data-view="graph"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="6" r="2.5"/><circle cx="19" cy="7" r="2.5"/><circle cx="12" cy="18" r="2.5"/><path d="M7 7.5 10.5 16M16.7 8.8 13.5 16.5M7.2 6.5h9.6"/></svg> Grafo</button>
    </nav>
    <div class="list-head"><span id="listLabel">Notas recentes</span><button id="newNoteBtn" title="Nova nota">＋</button></div>
    <div id="noteList"></div>
    <div class="side-foot">
      <button id="exportBtn" title="Exportar todas como .md"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg> Exportar</button>
      <button id="importBtn" title="Importar arquivos .md"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15V3M7 8l5-5 5 5M5 21h14"/></svg> Importar</button>
      <button id="themeBtn" title="Tema claro/escuro"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg> Tema</button>
      <button id="settingsBtn" title="Configurações"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 0 1-4 0v-.2A1.6 1.6 0 0 0 6.6 19a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 3 13.4 2 2 0 0 1 3 9.4 1.6 1.6 0 0 0 4.9 6.6a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 10.5 3 2 2 0 0 1 14.5 3a1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1A1.6 1.6 0 0 0 21 9.4a2 2 0 0 1 0 4z"/></svg> Config</button>
    </div>
  </aside>

  <main id="main">
    <div class="topbar">
      <button class="hamb" id="hamb">☰</button>
      <span id="crumb">Diário</span>
      <button class="tb-btn" id="viewModeBtn" title="Alternar edição/prévia"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></svg></button>
      <button class="tb-btn" id="splitBtn" title="Visualização dividida"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M12 4v16"/></svg></button>
      <button class="tb-btn" id="noteMenuBtn" title="Opções da nota"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></button>
    </div>
    <div id="content"></div>
  </main>
</div>

<div id="toast"></div>
<div class="menu" id="noteMenu"></div>
<div class="modal-bg" id="modalBg"><div class="modal" id="modalBox"></div></div>
<input type="file" id="fileInput" accept=".md,.markdown,.txt" multiple style="display:none">

<script src="app.js"></script>
</body>
